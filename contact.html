<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <a href="index.html" class="logo">Course Organizer</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">My Courses</a></li>
                <li><a href="add-course.html">Add Course</a></li>
                <li><a href="contact.html" class="active">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h1 class="page-title">Contact Us</h1>
            
            <p style="margin-bottom: 2rem; color: var(--text-muted);">Have a question or need assistance? Send us a message below.</p>

            <form action="#" method="GET">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" class="form-control" required placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" required placeholder="Enter your email address">
                </div>
                
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" class="form-control" required placeholder="How can we help you?"></textarea>
                </div>
                
                <button type="submit" class="btn">Send Message</button>
            </form>
            
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Personal Course Organizer.||Designed by Omar Ashraf|| All Rights Reserved.</p>
    </footer>

</body>
</html>
